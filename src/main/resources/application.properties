spring.application.name=ai-video-generator
server.port=8080

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=200MB

video.temp-root=/tmp
video.output-dir=./videos

# Database (Phase-1 hardening)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ai_video_generator}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

# JWT (minimum 32 chars secret)
security.jwt.secret=${JWT_SECRET:change-this-secret-to-a-strong-32-char-minimum-key}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}

tts.url=https://api.elevenlabs.io/v1/text-to-speech
tts.api-key=YOUR_ELEVENLABS_API_KEY
tts.voice-id=EXAVITQu4vr4xnSDxMaL

# Comma-separated list of frontend origins allowed by CORS (supports wildcards via allowedOriginPatterns)
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
